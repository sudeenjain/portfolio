name: Auto-Update Resume

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  # Run every night at midnight IST (18:30 UTC)
  schedule:
    - cron: "30 18 * * *"

  # Run whenever changes are pushed to master or main
  push:
    branches:
      - master
      - main

  # Allow manual run from GitHub Actions
  workflow_dispatch:

# ─── Permissions ─────────────────────────────────────────────────────────────
permissions:
  contents: write

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:
  build-resume:
    name: Generate & Compile Resume
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repository ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Verify resume directory ────────────────────────────────────────
      - name: Verify resume directory
        run: |
          echo "Repository contents:"
          ls -la

          if [ ! -d "resume" ]; then
            echo "ERROR: resume directory does not exist."
            exit 1
          fi

          echo "Resume directory contents:"
          ls -la resume

      # ── 4. Generate resume.tex from Supabase data ────────────────────────
      - name: Generate resume.tex
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cd resume

          echo "Generating resume.tex..."
          python generate_resume.py

          if [ ! -f "resume.tex" ]; then
            echo "ERROR: resume.tex was not generated."
            exit 1
          fi

          echo "resume.tex generated successfully."
          ls -lh resume.tex

      # ── 5. Install Tectonic LaTeX compiler ───────────────────────────────
      - name: Install Tectonic
        run: |
          echo "Installing Tectonic..."

          curl --proto '=https' \
               --tlsv1.2 \
               -fsSL \
               https://drop-sh.fullyjustified.net | sh

          if [ ! -f "tectonic" ]; then
            echo "ERROR: Tectonic executable was not downloaded."
            exit 1
          fi

          chmod +x tectonic
          sudo mv tectonic /usr/local/bin/tectonic

          echo "Tectonic installed successfully."
          which tectonic
          tectonic --version

      # ── 6. Compile resume.tex → resume.pdf ───────────────────────────────
      - name: Compile LaTeX to PDF
        env:
          RUST_BACKTRACE: "1"
        run: |
          cd resume

          echo "Starting LaTeX compilation..."
          echo "Current directory:"
          pwd

          echo "Files before compilation:"
          ls -la

          tectonic resume.tex \
            --keep-logs \
            --keep-intermediates

      # ── 7. Show LaTeX logs if compilation produced them ─────────────────
      - name: Show LaTeX compilation logs
        if: always()
        run: |
          echo "Resume directory after compilation:"
          ls -la resume || true

          if [ -f "resume/resume.log" ]; then
            echo "=============================="
            echo "LATEX COMPILATION LOG"
            echo "=============================="
            cat resume/resume.log
          else
            echo "No resume.log file found."
          fi

      # ── 8. Verify generated PDF ──────────────────────────────────────────
      - name: Verify generated resume
        run: |
          if [ ! -f "resume/resume.pdf" ]; then
            echo "ERROR: resume.pdf was not generated."

            echo "Available files:"
            ls -la resume/

            exit 1
          fi

          echo "Resume PDF generated successfully."
          ls -lh resume/resume.pdf

      # ── 9. Commit updated resume files ───────────────────────────────────
      - name: Commit updated resume
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add resume/resume.pdf
          git add resume/resume.tex

          if git diff --cached --quiet; then
            echo "No resume changes detected. Nothing to commit."
          else
            git commit -m "chore: auto-update resume [skip ci]"
            git push
          fi

      # ── 10. Final success message ────────────────────────────────────────
      - name: Resume build completed
        run: |
          echo "======================================"
          echo "Resume update completed successfully!"
          echo "======================================"
          echo "PDF location: resume/resume.pdf"
