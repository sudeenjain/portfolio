      # ── Install LaTeX ──────────────────────────────────────────────────────
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-extra \
            latexmk

      # ── Compile resume.tex → resume.pdf ───────────────────────────────────
      - name: Compile LaTeX to PDF
        run: |
          cd resume
          latexmk -xelatex \
            -interaction=nonstopmode \
            -halt-on-error \
            resume.tex
